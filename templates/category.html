<!doctype html>
<html xmlns:th="https://www.thymeleaf.org"
  th:replace="~{modules/layout :: html(
    title        = ${category.spec.displayName} + ' - ' + ${site.title},
    hero         = ~{::hero},
    content      = ~{::emptycont},
    head         = ~{::head},
    footer       = null,
    sidebar      = ~{::emptybar},
    contentClass = 'hidden'
  )}"
>
  <th:block th:fragment="head">
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/assets/styles/company.css}"/>
  </th:block>

  <th:block th:fragment="hero">
  <div style="background:#FAF8F5">
    <div class="news-hero">
      <div class="news-hero-bg" style="background-image:url('/themes/theme-dylan-mall/assets/images/company/mall-render.jpg')"></div>
      <div class="news-hero-overlay"></div>
      <div class="news-hero-content">
        <div class="news-hero-bc" th:with="n = ${theme.config.syh_news}">
          <a href="/">首页</a><span>/</span><a th:href="${not #strings.isEmpty(n.extra.news_page_slug) ? '/' + n.extra.news_page_slug : '/news-list'}">新闻动态</a><span>/</span>
          <span th:text="${category.spec.displayName}"></span>
        </div>
        <h1><em th:text="${category.spec.displayName}"></em></h1>
      </div>
    </div>

    <th:block th:with="cats = ${categoryFinder.listAsTree()}, tags = ${tagFinder.listAll()}, 
                       n = ${theme.config.syh_news}, l = ${theme.config.layout},
                       allNewsBtnText = ${not #strings.isEmpty(n.filter.all_news_btn_text) ? n.filter.all_news_btn_text : '全部动态'},
                       allNewsBtnUrl = ${not #strings.isEmpty(n.filter.all_news_btn_url) ? n.filter.all_news_btn_url : '/news-list'},
                       layoutClass = ${l.post_list_layout == 'grid_2' ? 'news-grid-2' : l.post_list_layout == 'single' ? 'news-grid-1' : 'news-grid-3'}">
    <div class="news-body">
      <div>
        <div class="news-filter-bar">
          <a th:href="${allNewsBtnUrl}" th:text="${allNewsBtnText}" class="news-filter-btn"></a>
          <th:block th:each="cat : ${cats}">
            <a class="news-filter-btn"
               th:classappend="${category.metadata.name == cat.metadata.name} ? 'active'"
               th:href="@{${cat.status.permalink}}"
               th:text="${cat.spec.displayName}">
            </a>
          </th:block>
        </div>

        <div class="news-grid" th:classappend="${layoutClass}">
          <th:block th:if="${posts.total gt 0}" th:each="post : ${posts.items}">
            <article class="news-card">
              <th:block th:if="${not #strings.isEmpty(post.spec.cover)}">
                <a class="news-card-img-wrap" th:href="@{${post.status.permalink}}">
                  <img class="news-card-img" th:src="${post.spec.cover}" th:alt="${post.spec.title}">
                </a>
              </th:block>
              <th:block th:if="${#strings.isEmpty(post.spec.cover)}">
                <div class="news-card-img-ph">📰</div>
              </th:block>
              <div class="news-card-body">
                <div class="news-card-meta">
                  <th:block th:if="${not #lists.isEmpty(post.categories)}">
                    <a class="news-card-cat" th:href="@{${post.categories[0].status.permalink}}" th:text="${post.categories[0].spec.displayName}"></a>
                  </th:block>
                  <th:block th:each="tag : ${post.tags}">
                    <a class="news-card-tag" th:href="@{${tag.status.permalink}}" th:text="|#${tag.spec.displayName}|"></a>
                  </th:block>
                </div>
                <h2 class="news-card-title"><a th:href="@{${post.status.permalink}}" th:text="${post.spec.title}"></a></h2>
                <p class="news-card-excerpt" th:text="${post.status.excerpt}"></p>
                <div class="news-card-footer">
                  <span class="news-card-date" th:text="${#dates.format(post.spec.publishTime,'yyyy-MM-dd')}"></span>
                  <a class="news-card-read" th:href="@{${post.status.permalink}}">阅读全文 →</a>
                </div>
              </div>
            </article>
          </th:block>
          <div class="news-empty" th:if="${posts.total == 0}"><span class="icon">📭</span><p>该分类暂无文章</p></div>
        </div>

        <div class="news-pagination" th:if="${posts.hasPrevious() or posts.hasNext()}">
          <a class="news-page-btn" th:classappend="${!posts.hasPrevious()} ? 'disabled'" th:href="${posts.prevUrl}">← 上一页</a>
          <span class="news-page-info">第 <th:block th:text="${posts.page}"/> / <th:block th:text="${posts.totalPages}"/> 页</span>
          <a class="news-page-btn" th:classappend="${!posts.hasNext()} ? 'disabled'" th:href="${posts.nextUrl}">下一页 →</a>
        </div>
      </div>

      <aside class="news-sidebar">
        <div class="sidebar-block" th:if="${not #lists.isEmpty(cats)}">
          <div class="sidebar-block-title">文章分类</div>
          <div class="sidebar-block-body">
            <ul class="sidebar-cat-list">
              <li class="sidebar-cat-item"><a th:href="${not #strings.isEmpty(n.filter.all_news_btn_url) ? n.filter.all_news_btn_url : '/news-list'}"><span>全部动态</span></a></li>
              <th:block th:each="cat : ${cats}">
                <li class="sidebar-cat-item">
                  <a th:href="@{${cat.status.permalink}}"
                     th:classappend="${category.metadata.name == cat.metadata.name} ? 'cur'">
                    <span th:text="${cat.spec.displayName}"></span>
                    <span class="sidebar-cat-count" th:text="${cat.postCount ?: 0}"></span>
                  </a>
                </li>
              </th:block>
            </ul>
          </div>
        </div>
        <div class="sidebar-block" th:if="${not #lists.isEmpty(tags)}">
          <div class="sidebar-block-title">标签云</div>
          <div class="sidebar-block-body">
            <div class="sidebar-tags">
              <th:block th:each="tag : ${tags}">
                <a class="sidebar-tag" th:href="@{${tag.status.permalink}}" th:text="|#${tag.spec.displayName}|"></a>
              </th:block>
            </div>
          </div>
        </div>
      </aside>
    </div>
    </th:block>
  </div>
  </th:block>

  <div th:fragment="emptycont"></div>
  <th:block th:fragment="emptybar"></th:block>
</html>
