<!doctype html>
<html xmlns:th="https://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
  th:replace="~{modules/layout :: html(
    title        = ${singlePage.spec.title} + ' - ' + ${site.title},
    hero         = ~{::hero},
    content      = ~{::content},
    head         = ~{::head},
    footer       = null,
    sidebar      = null,
    contentClass = ''
  )}"
>
  <th:block th:fragment="head">
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/assets/styles/company.css}"/>
    <link rel="stylesheet" th:href="@{/assets/styles/github-markdown.css}"/>
    <style>
      /* 覆盖 modules/sidebar 让内容全宽 */
      .md\:grid-cols-\[1fr_18rem\] { grid-template-columns: 1fr !important; }
    </style>
  </th:block>

  <!-- hero: 有封面图时显示 -->
  <th:block th:fragment="hero">
    <th:block th:if="${not #strings.isEmpty(singlePage.spec.cover)}">
      <div class="syh-reader-cover-hero"
           th:style="|background-image:url('${singlePage.spec.cover}')|">
        <div class="syh-reader-cover-hero-overlay"></div>
        <div class="syh-reader-cover-title" th:text="${singlePage.spec.title}"></div>
      </div>
    </th:block>
    <th:block th:if="${#strings.isEmpty(singlePage.spec.cover)}">
      <div style="background:var(--syh-ink);padding:44px 64px 36px;position:relative;overflow:hidden">
        <div style="position:absolute;inset:0;opacity:.07;background:radial-gradient(ellipse at 20% 50%,var(--syh-gold),transparent 70%)"></div>
        <div style="position:relative;max-width:860px">
          <div style="font-size:10px;letter-spacing:.28em;color:var(--syh-gold);text-transform:uppercase;margin-bottom:10px">Page</div>
          <h1 style="font-family:'Noto Serif SC',serif;font-size:clamp(22px,3vw,36px);font-weight:700;color:#fff;line-height:1.3;margin:0"
              th:text="${singlePage.spec.title}"></h1>
        </div>
      </div>
    </th:block>
  </th:block>

  <th:block th:fragment="content">
    <div class="syh-reader-wrap">
      <!-- 元信息 -->
      <div class="syh-reader-meta">
        <span th:text="${#dates.format(singlePage.spec.publishTime,'yyyy年MM月dd日')}"></span>
        <span style="color:#ddd">·</span>
        <span th:text="${(singlePage.stats?.visit ?: 0)} + ' 阅读'"></span>
        <div sec:authorize="isAuthenticated()"
             th:attr="x-data=|uiPermission('${#authentication.name}','system:singlepages:manage')|">
          <template x-if="shouldDisplay">
            <a class="syh-reader-meta-edit"
               th:href="|/console/single-pages/editor?name=${singlePage.metadata.name}&returnToView=true|">✏ 编辑</a>
          </template>
        </div>
      </div>
      <!-- 内容 -->
      <article class="syh-reader-content markdown-body"
               th:utext="${singlePage.content.content}">
      </article>
      <!-- 评论 -->
      <div class="syh-reader-comment" th:if="${haloCommentEnabled}" id="comment">
        <div class="syh-reader-comment-title">评论</div>
        <halo:comment group="content.halo.run" kind="SinglePage" th:attr="name=${singlePage.metadata.name}"/>
      </div>
    </div>
  </th:block>
</html>
