  # ==================== 布局设置 ====================
  - group: layout
    label: 布局
    formSchema:
      - $formkit: select
        name: post_list_layout
        label: 文章列表布局
        help: 控制文章归档页的显示布局（网格/单条）。注意：当前新闻动态页已独立定制，此设置可能无效。
        value: grid_3
        options:
          - label: 网格（一行三列）
            value: grid_3
          - label: 网格（一行两列）
            value: grid_2
          - label: 单条
            value: single
      - $formkit: select
        name: header_widget
        id: header_widget
        label: 首页顶部模块
        help: 原主题首页顶部显示的模块（如最新文章、站点标题）。当前主页已独立定制，此设置可能无效。
        value: site_title
        options:
          - label: 无
            value: none
          - label: 最新一篇文章
            value: latest_post
          - label: 文章网格（最新五篇文章）
            value: latest_post_grid
          - label: 站点标题
            value: site_title
      - $formkit: checkbox
        name: content_header
        label: 显示文章页面顶部背景
        help: 是否在文章详情页显示顶部背景。当前文章页已独立定制，此设置可能无效。
        value: true

  # ==================== 样式设置 ====================
  - group: style
    label: 样式
    formSchema:
      - $formkit: select
        name: color_scheme
        label: 默认配色
        help: 选择网站默认的配色方案（深色/浅色/跟随系统）。
        value: system
        options:
          - label: 跟随系统
            value: system
          - label: 深色
            value: dark
          - label: 浅色
            value: light
      - $formkit: checkbox
        name: enable_change_color_scheme
        label: 允许访客切换配色
        help: 开启后，页头会出现配色切换按钮，访客可手动切换深色/浅色模式。
        value: true

  # ==================== 文章设置 ====================
  - group: post
    label: 文章
    formSchema:
      - $formkit: select
        name: content_style
        label: 内容样式
        help: 文章内容区域的样式（GitHub 风格或 Tailwind Typography）。
        value: github
        options:
          - label: GitHub 风格
            value: github
          - label: Tailwind CSS Typography
            value: tailwind
      - $formkit: select
        name: title_position
        label: 标题位置
        help: 文章标题显示的位置（正文中或封面中）。
        value: content
        options:
          - value: content
            label: 正文中
          - value: cover
            label: 封面中
      - $formkit: text
        name: cover_height
        label: 封面图高度
        help: 文章封面图的高度，支持 CSS 单位（如 24rem）。
        value: 24rem
      - $formkit: checkbox
        name: show_upvote_button
        label: 显示点赞按钮
        help: 是否在文章页显示点赞按钮。注意：当前文章页已独立定制，此设置可能无效。
        value: true
      - $formkit: checkbox
        name: show_share_button
        id: show_share_button
        label: 显示分享按钮
        help: 是否在文章页显示分享按钮。注意：当前文章页已独立定制，此设置可能无效。
        value: true

  # ==================== 备案设置 ====================
  - group: beian
    label: 备案设置
    formSchema:
      - $formkit: text
        name: icp_text
        label: ICP备案号
        help: 网站 ICP 备案号，如“粤ICP备12345678号”。
      - $formkit: text
        name: icp_link
        label: ICP备案跳转链接
        help: ICP 备案号对应的链接，一般指向工信部备案查询页面。
        value: https://beian.miit.gov.cn/
      - $formkit: text
        name: gongan_text
        label: 公安联网备案号
        help: 公安联网备案号（如有）。
      - $formkit: text
        name: gongan_link
        label: 公安联网备案跳转链接
        help: 公安联网备案查询链接。示例：https://beian.mps.gov.cn/#/query/webSearch?code=11010102000001
        value: https://beian.mps.gov.cn/#/query/webSearch
