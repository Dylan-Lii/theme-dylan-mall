apiVersion: v1alpha1
kind: Setting
metadata:
  name: theme-dylan-mall-setting      # 与 theme.yaml 中的 settingName 一致
spec:
  forms:
  # ==================== 主页 (syh) ====================
  - group: syh
    label: 主页
    formSchema:
      # Hero 区
      - $formkit: group
        name: hero
        label: Hero 区（首页顶部大图区域）
        expanded: true
        children:
          - $formkit: attachment
            name: bg_image
            label: 背景图片
            help: 建议尺寸 1920x1080 以上，重点内容居中，图片将自动压暗处理。此图片将作为首页 Hero 区域背景。
            value: /themes/theme-dylan-mall/assets/images/company/mall-night.jpg
          - $formkit: text
            name: eyebrow
            label: 小标题
            help: 显示在 Hero 区域顶部，建议 8-12 个汉字，起到画龙点睛作用。
            value: 粤港澳大湾区商业运营专家
          - $formkit: text
            name: title
            label: 主标题行1（白色）
            help: 第一行主标题，建议 6-8 个汉字，与第二行配合。
            value: 深耕十四年
          - $formkit: text
            name: title2
            label: 主标题行2（金色）
            help: 第二行主标题，建议 6-8 个汉字，颜色为金色，与第一行形成对比。
            value: 铸就湾区商业新格局
          - $formkit: textarea
            rows: 2
            name: desc
            label: 描述文字
            help: Hero 区域的描述文字，建议 30-60 字，简要介绍企业。
            value: 集房地产开发、农产品批发、商业运营、娱乐传媒于一体的综合性民营企业集团，构建覆盖深圳、东莞、揭阳、惠州的战略商业版图。
          - $formkit: text
            name: btn1_text
            label: 按钮1文字
            help: 左侧主按钮文字，建议 4-6 个字。
            value: 了解集团 →
          - $formkit: text
            name: btn1_url
            label: 按钮1链接
            help: 按钮跳转地址，可使用相对路径（如 /about）或完整 URL。
            value: /about
          - $formkit: text
            name: btn2_text
            label: 按钮2文字
            help: 右侧辅助按钮文字，建议 4-6 个字。
            value: 商务合作
          - $formkit: text
            name: btn2_url
            label: 按钮2链接
            help: 按钮跳转地址。
            value: /contact

      # 统计数据区（主页独立）
      - $formkit: group
        name: stats
        label: 统计数据区（主页独立）
        expanded: true
        children:
          - $formkit: text
            name: num1
            label: 数字1
            help: 显示在统计卡片上的数字，建议纯数字。
            value: '16'
          - $formkit: text
            name: unit1
            label: 单位1
            help: 数字后面的单位，如“年”“万+㎡”等。
            value: 年
          - $formkit: text
            name: label1
            label: 说明1
            help: 数字下方的说明文字，建议 6-10 个字。
            value: 行业深耕经验
          - $formkit: text
            name: num2
            label: 数字2
            value: '13'
          - $formkit: text
            name: unit2
            label: 单位2
            value: 万+㎡
          - $formkit: text
            name: label2
            label: 说明2
            value: 自有物业面积
          - $formkit: text
            name: num3
            label: 数字3
            value: '3000'
          - $formkit: text
            name: unit3
            label: 单位3
            value: +
          - $formkit: text
            name: label3
            label: 说明3
            value: 合作品牌商户
          - $formkit: text
            name: num4
            label: 数字4
            value: '99'
          - $formkit: text
            name: unit4
            label: 单位4
            value: '%'
          - $formkit: text
            name: label4
            label: 说明4
            value: 出租率

      # 核心业务区（首页磁贴）
      - $formkit: group
        name: biz
        label: 核心业务区（首页磁贴）标题与按钮
        expanded: true
        children:
          - $formkit: text
            name: section_eyebrow
            label: 区块小标题
            help: 显示在核心业务区顶部的小标题，建议 6-8 个字。
            value: 核心业务板块
          - $formkit: text
            name: section_title
            label: 主标题
            help: 核心业务区的主标题，建议 8-12 个字。
            value: 四大引擎，协同共生
          - $formkit: text
            name: btn_text
            label: 按钮文字
            help: 右侧“查看全部业务”按钮的文字。
            value: 查看全部业务 →
          - $formkit: text
            name: btn_url
            label: 按钮链接
            help: 按钮跳转地址，一般指向核心业务页面。
            value: /business

      # 主页核心业务磁贴（独立配置，8个）
      - $formkit: group
        name: home_tiles
        label: 主页核心业务磁贴（8个）
        expanded: true
        help: 配置主页上显示的8个核心业务磁贴（建议保持8个以匹配布局）。每个磁贴包含图片、编号、标题、描述和链接。
        children:
          - $formkit: repeater
            name: tiles
            label: 磁贴列表
            help: 可添加最多8个磁贴，建议保持8个以保持布局美观。
            value:
              - img: /themes/theme-dylan-mall/assets/images/company/mall-night.jpg
                num: 01 / SHOPPING MALL
                title: 商业综合体运营
                desc: 8万㎡ · 5.8万㎡
                link: /business#mall
              - img: /themes/theme-dylan-mall/assets/images/company/market.jpg
                num: 02 / WHOLESALE
                title: 农产品批发运营
                desc: 4大市场 · 12万㎡
                link: /business#market
              - img: /themes/theme-dylan-mall/assets/images/company/cinema.jpg
                num: 03 / CINEMA
                title: 上悦汇影城
                desc: 4K激光巨幕 · 旗舰3000㎡
                link: /business#cinema
              - img: /themes/theme-dylan-mall/assets/images/company/entertainment.jpg
                num: 04 / ENTERTAINMENT
                title: 嗨客玩家电玩
                desc: 1000㎡ · 电玩融合
                link: /business#entertainment
              - img: /themes/theme-dylan-mall/assets/images/company/mall-night.jpg
                num: 05 / NEW BUSINESS
                title: 新业务板块5
                desc: 即将上线
                link: /contact
              - img: /themes/theme-dylan-mall/assets/images/company/market.jpg
                num: 06 / NEW BUSINESS
                title: 新业务板块6
                desc: 即将上线
                link: /contact
              - img: /themes/theme-dylan-mall/assets/images/company/cinema.jpg
                num: 07 / NEW BUSINESS
                title: 新业务板块7
                desc: 即将上线
                link: /contact
              - img: /themes/theme-dylan-mall/assets/images/company/entertainment.jpg
                num: 08 / NEW BUSINESS
                title: 新业务板块8
                desc: 即将上线
                link: /contact
            children:
              - $formkit: attachment
                name: img
                label: 图片
                help: 建议尺寸 1920x1080 以上，图片将裁剪为 16:9 比例显示。
                value: ''
              - $formkit: text
                name: num
                label: 编号/标签
                help: 显示在图片上方的编号或英文标签，如“01 / SHOPPING MALL”，建议 15-20 字符。
                value: ''
              - $formkit: text
                name: title
                label: 标题
                help: 磁贴主标题，建议 6-10 个汉字。
                value: ''
              - $formkit: text
                name: desc
                label: 描述
                help: 磁贴描述文字，建议 10-15 个汉字，可包含数字和符号。
                value: ''
              - $formkit: text
                name: link
                label: 跳转链接
                help: 点击磁贴跳转的地址，可使用锚点（如 /business#mall）或完整 URL。
                value: ''

      # 优势区（可动态增删）
      - $formkit: group
        name: why
        label: 优势区
        expanded: true
        children:
          - $formkit: text
            name: eyebrow
            label: 区块小标题
            help: 优势区顶部小标题，建议 6-8 个字。
            value: 为什么选择我们
          - $formkit: text
            name: title
            label: 主标题
            help: 优势区主标题，建议 8-12 个字。
            value: 16年积累，实力见证
          - $formkit: repeater
            name: items
            label: 优势条目
            help: 可添加任意数量的优势卡片，每个卡片包含图标（Emoji）、标题、描述。
            value:
              - icon: 🏆
                title: 深厚行业积淀
                desc: 自2009年成立，16年专注商业运营，团队成员来自万达、保利、茂业、华润等知名企业，拥有丰富实战经验。
              - icon: 🗺️
                title: 大湾区战略布局
                desc: 深耕东莞、深圳，辐射揭阳、惠州，在粤港澳大湾区建立了覆盖四城的强大商业网络，战略布局领先同业。
              - icon: 📊
                title: 卓越运营指标
                desc: 13万+㎡自有物业，99%出租率，3000+合作品牌商户，97%+招商满铺率，各项运营数据均处于行业领先水平。
              - icon: 🎯
                title: 多元业态布局
                desc: 覆盖购物中心、农产品批发、影院娱乐、电玩体验等多元业态，形成完整的一站式商业消费生态闭环。
              - icon: 🤝
                title: 优质品牌矩阵
                desc: 与永辉超市、星巴克、肯德基、周大福、老凤祥等3000+知名品牌商户建立长期深度合作，品牌号召力强。
              - icon: 🚀
                title: 持续创新发展
                desc: 积极布局社区体验式商业、会员矩阵营销、场景化购物娱乐等新兴商业模式，引领区域商业创新升级。
            children:
              - $formkit: text
                name: icon
                label: 图标（Emoji或Boxicons）
                help: 可使用 Emoji（如 🏆）或 Boxicons 类名（如 bx-trophy），建议使用 Emoji 简单通用。
                value: ''
              - $formkit: text
                name: title
                label: 标题
                help: 优势卡片标题，建议 6-10 个字。
                value: ''
              - $formkit: textarea
                rows: 2
                name: desc
                label: 描述
                help: 优势卡片描述，建议 40-80 字，简要阐述优势。
                value: ''

      # 合作品牌区
      - $formkit: group
        name: brands
        label: 合作品牌区
        expanded: true
        children:
          - $formkit: text
            name: count
            label: 数量大字
            help: 显示在顶部的大数字，如“3000+”，用于强调品牌数量。
            value: 3000+
          - $formkit: text
            name: title
            label: 副标题
            help: 大数字下方的标题，建议 10-15 个字。
            value: 优质合作品牌商户共同见证
          - $formkit: text
            name: subtitle_text
            label: 小标题文字（与数字拼接）
            help: 与数字拼接的小标题，如“合作品牌商户”，形成“3000+ 合作品牌商户”。
            value: 合作品牌商户
          - $formkit: repeater
            name: items
            label: 品牌列表
            help: 可添加任意品牌名称，将展示为单行滚动列表。每个品牌名建议不超过 20 个字符。
            value:
              - name: 永辉超市
              - name: 星巴克 Starbucks
              - name: 肯德基 KFC
              - name: 周大福
              - name: 六福珠宝
              - name: 老凤祥
              - name: 屈臣氏
              - name: 比亚迪
              - name: YH BRAVO
              - name: 永旺莫莉幻想
              - name: 任宿鹅城
              - name: 苹果魅友
              - name: 麦当劳
              - name: 必胜客
              - name: 国美电器
              - name: 华润万家
            children:
              - $formkit: text
                name: name
                label: 品牌名称
                help: 品牌名称，建议不超过 20 个字符，过长可能影响滚动显示。
                value: ''

      # CTA 区
      - $formkit: group
        name: cta
        label: CTA 区（行动号召区域）
        expanded: true
        children:
          - $formkit: checkbox
            name: show_cta
            label: 显示 CTA 区
            help: 关闭后整个 CTA 区块将不显示。
            value: false
          - $formkit: attachment
            name: bg
            label: 背景图片
            help: 建议尺寸 1920x800 以上，图片将做暗色处理。
            value: /themes/theme-dylan-mall/assets/images/company/mall-render.jpg
          - $formkit: text
            name: eyebrow
            label: 小标题
            help: 显示在 CTA 区域顶部，建议 6-8 个字。
            value: 精诚合作 · 携手共赢
          - $formkit: text
            name: title
            label: 主标题
            help: CTA 区域主标题，建议 10-15 个字。
            value: 期待与您携手，共筑未来
          - $formkit: text
            name: sub
            label: 副标题
            help: 主标题下方的说明文字，建议 15-25 个字。
            value: 共同开创华南区商业运营新篇章
          - $formkit: text
            name: btn1_text
            label: 按钮1文字
            help: 左侧按钮文字，建议 6-10 个字。
            value: 立即联系我们 →
          - $formkit: text
            name: btn1_url
            label: 按钮1链接
            help: 按钮跳转地址。
            value: /contact
          - $formkit: text
            name: btn2_text
            label: 按钮2文字
            help: 右侧按钮文字，建议 6-10 个字。
            value: 了解集团详情
          - $formkit: text
            name: btn2_url
            label: 按钮2链接
            help: 按钮跳转地址。
            value: /about

  # ==================== 核心业务页 (syh_business) ====================
  - group: syh_business
    label: 核心业务
    formSchema:
      # Hero 区
      - $formkit: group
        name: hero
        label: Hero 区（页面顶部区域）
        expanded: true
        children:
          - $formkit: attachment
            name: bg
            label: 背景图片
            help: 建议尺寸 1920x800 以上，图片将做暗色处理。
            value: /themes/theme-dylan-mall/assets/images/company/mall-night.jpg
          - $formkit: text
            name: eyebrow
            label: 英文小标题
            help: 显示在顶部的小标题，一般用英文，如“Core Business”。
            value: Core Business
          - $formkit: text
            name: title_white
            label: 主标题白色部分
            help: 页面主标题的白色部分，如“核心”。
            value: 核心
          - $formkit: text
            name: title_gold
            label: 主标题金色部分
            help: 页面主标题的金色部分，如“业务板块”。
            value: 业务板块

      # 业务板块列表（可动态增删）
      - $formkit: group
        name: items
        label: 业务板块列表
        expanded: true
        children:
          - $formkit: repeater
            name: list
            label: 业务板块条目
            help: 可添加、删除、排序任意数量的业务板块。每个板块包含图片、标题、描述、指标等。
            value:
              - img: /themes/theme-dylan-mall/assets/images/company/mall-night.jpg
                eyebrow: 核心业务 · 01
                title: 商业综合体
                title_gold: 运营管理
                label: Shopping Mall
                desc1: 以打造区域商业标杆为目标，运营管理东莞上悦汇购物中心（8万㎡）和深圳兴万达广场（5.8万㎡）两大旗舰项目，总面积超13万㎡，年总销售额达7.5亿元。
                desc2: 通过精准招商、场景营造和活动运营，持续提升商业活力，与3000+知名品牌建立长期合作关系，实现区域消费升级。
                m1_num: 8万㎡
                m1_label: 东莞旗舰
                m2_num: 5.8万㎡
                m2_label: 深圳项目
                m3_num: 7.5亿
                m3_label: 年总销售额
                m4_num: 3000+
                m4_label: 合作品牌
                btn_text: ''
                btn_url: /contact
              - img: /themes/theme-dylan-mall/assets/images/company/market.jpg
                eyebrow: 核心业务 · 02
                title: 农产品批发
                title_gold: 市场运营
                label: 壹贰宝儿童成长中心
                desc1: 运营管理4大农产品批发市场，总面积12万㎡，构建辐射8省的物流配送网络，是大湾区重要的农产品集散中心。
                desc2: 引入现代化管理体系，推进数字化转型，为农产品从产地到餐桌提供高效、安全的供应链保障。
                m1_num: '4'
                m1_label: 大批发市场
                m2_num: 12万㎡
                m2_label: 总运营面积
                m3_num: 8省
                m3_label: 物流辐射范围
                m4_num: 数字化
                m4_label: 现代管理体系
                btn_text: ''
                btn_url: /contact
              - img: /themes/theme-dylan-mall/assets/images/company/cinema.jpg
                eyebrow: 核心业务 · 03
                title: 上悦汇影城
                title_gold: 娱乐传媒
                label: Cinema
                desc1: 旗下上悦汇影城以高品质观影体验为核心竞争力，配备4K激光巨幕放映系统，东莞旗舰店面积3000㎡，票房长期位居全市前十。
                desc2: 揭阳新店（3600㎡）已完成选址规划，预计将成为汕潮揭都市圈的旗舰影城，进一步强化集团在华南地区的娱乐传媒布局。
                m1_num: 3000㎡
                m1_label: 东莞旗舰店
                m2_num: 4K
                m2_label: 激光巨幕
                m3_num: 前十
                m3_label: 全市票房排名
                m4_num: 3600㎡
                m4_label: 揭阳新店（筹）
                btn_text: ''
                btn_url: /contact
              - img: /themes/theme-dylan-mall/assets/images/company/entertainment.jpg
                eyebrow: 核心业务 · 04
                title: 嗨客玩家
                title_gold: 电玩中心
                label: Entertainment
                desc1: 嗨客玩家电玩中心是集团自营的创新娱乐品牌，以1000㎡的宽敞空间融合电竞体验和传统电玩，打造面向年轻群体和亲子家庭的综合娱乐目的地。
                desc2: 通过不断引进前沿娱乐设备和创新运营模式，成为购物中心娱乐业态的引流核心，有效提升整体商业项目的客流活跃度。
                m1_num: 1000㎡
                m1_label: 中心面积
                m2_num: 电竞+
                m2_label: 电玩融合
                m3_num: 亲子
                m3_label: 家庭娱乐
                m4_num: 社交
                m4_label: 年轻人基地
                btn_text: ''
                btn_url: /contact
            children:
              - $formkit: attachment
                name: img
                label: 图片
                help: 建议尺寸 1200x900 以上，图片将裁剪为 4:3 比例显示。
                value: ''
              - $formkit: text
                name: eyebrow
                label: 小标题
                help: 板块上方的小标题，如“核心业务 · 01”，建议 10-15 字符。
                value: ''
              - $formkit: text
                name: title
                label: 标题白色部分
                help: 板块主标题的白色部分，建议 4-8 个字。
                value: ''
              - $formkit: text
                name: title_gold
                label: 标题金色部分
